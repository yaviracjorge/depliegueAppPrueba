name: Publicar Imagen Docker en GitHub Packages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # 1. Iniciar sesión en GitHub Packages usando el token automático
      - name: Iniciar sesión en GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Construir la imagen leyendo tu Dockerfile y subirla
      - name: Construir y subir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # IMPORTANTE: Todo en minúsculas
          tags: ghcr.io/yaviracjorge/depliegueappprueba:latest
